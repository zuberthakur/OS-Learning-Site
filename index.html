<!DOCTYPE html>
<html lang="en">
<head>
    <title>OPERATING SYSTEM NOTES</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top, #87CEEB, #e0f7ff);
        }

        /* CLOUDS */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before, .cloud::after {
            content: "";
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud1 {
            width: 200px;
            height: 60px;
            top: 20%;
            left: -200px;
            animation: moveClouds 30s linear infinite;
        }

        .cloud1::before {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 20px;
        }

        .cloud1::after {
            width: 80px;
            height: 80px;
            top: -30px;
            right: 20px;
        }

        .cloud2 {
            width: 250px;
            height: 70px;
            top: 60%;
            left: -250px;
            animation: moveClouds 45s linear infinite;
        }

        .cloud2::before {
            width: 120px;
            height: 120px;
            top: -60px;
            left: 30px;
        }

        .cloud2::after {
            width: 90px;
            height: 90px;
            top: -40px;
            right: 30px;
        }

        @keyframes moveClouds {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(120vw);
            }
        }

        /* CONTENT */
        .container {
            text-align: center;
            z-index: 1;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 55px;
            color: #0a3d62;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        p {
            color: #2f4f4f;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #00bfff, #1e90ff);
            box-shadow: 0 0 10px rgba(30,144,255,0.6);
            transition: 0.4s;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 0 20px rgba(30,144,255,1);
        }
    </style>
</head>

<body>

<!-- CLOUDS -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<!-- CONTENT -->
<div class="container">
    <h1>☁️ OS NOTES</h1>
    <p>Learn Operating System in a Beautiful Way</p>

    <a href="unit2.html" class="btn">Unit 2</a>
    <a href="unit3.html" class="btn">Unit 3</a>
    <a href="unit4.html" class="btn">Unit 4</a>
    <a href="unit5.html" class="btn">Unit 5</a>
</div>

</body>
</html>
